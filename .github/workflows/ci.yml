name: CI

on:
    pull_request:
    push:
        branches:
            - "**"
        tags:
            - "v*"

jobs:
    linux-ci:
        name: Linux Build and Test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Zig
              uses: mlugg/setup-zig@v2.2.1
              with:
                  version: master

            - name: Show Zig version
              run: zig version

            - name: Type-check
              run: zig build check

            - name: Build
              run: zig build

            - name: Run tests
              run: zig build test

    release-linux:
        name: Release Linux Binary
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        needs:
            - linux-ci
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Zig
              uses: mlugg/setup-zig@v2.2.1
              with:
                  version: master

            - name: Build Release Binary
              run: zig build -Doptimize=ReleaseFast

            - name: Package Linux artifact
              run: |
                  mkdir -p dist
                  cp zig-out/bin/cp-zig dist/cp-zig-linux-x86_64
                  chmod +x dist/cp-zig-linux-x86_64
                  tar -C dist -czf dist/cp-zig-linux-x86_64.tar.gz cp-zig-linux-x86_64
                  sha256sum dist/cp-zig-linux-x86_64.tar.gz > dist/cp-zig-linux-x86_64.tar.gz.sha256

            - name: Publish release assets
              uses: softprops/action-gh-release@v3
              with:
                  files: |
                      dist/cp-zig-linux-x86_64.tar.gz
                      dist/cp-zig-linux-x86_64.tar.gz.sha256
